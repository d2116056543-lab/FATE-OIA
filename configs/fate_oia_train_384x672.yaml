model:
  patch_size: 8
  action_dim: 4
  reason_dim: 21
  use_label_query: true
  use_reason_to_action: true
data:
  preserve_aspect_ratio: true
  letterbox: true
  resize_short: 384
  resize_long: 672
  image_height: 384
  image_width: 672
training:
  batch_size: 1
  gradient_accumulation_steps: 8
  amp: true
  num_workers: 4
  loss_action: 1.0
  loss_reason: 1.5
  loss_action_visual: 0.05
  loss_r2a_gt: 0.10
  loss_action_agree: 0.01
  include_fused_branch_loss: false
  loss_grounding: 0.0
  loss_counterfactual: 0.0
  token_compression: none
  compression_start_epoch: 8
  compression_warmup_epochs: 6
  compression_keep_ratio_start: 0.85
  compression_keep_ratio_final: 0.65
